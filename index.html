<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Notes Sharing Platform</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"></script>
  <style>
    body { font-family: Arial; padding: 20px; }
    .card { border: 1px solid #ccc; padding: 10px; margin: 10px 0; }
    .section { margin-top: 30px; }
  </style>
</head>
<body><h1>🌐 Notes Sharing Platform</h1><div class="card">
  <h2>Upload Notes</h2>
  <input type="text" id="title" placeholder="Title"><br><br>
  <input type="text" id="subject" placeholder="Subject"><br><br>  <select id="category">
    <option>Class 9</option>
    <option>Class 10</option>
    <option>Class 11</option>
    <option>Class 12</option>
    <option>CUET</option>
    <option>NDA</option>
    <option>NEET</option>
    <option>JEE</option>
  </select><br><br>  <select id="type">
    <option>Notes</option>
    <option>PYQ</option>
  </select><br><br><input type="file" id="file" accept="application/pdf"><br><br> <button onclick="uploadNote()">Upload</button>

</div><div id="notesContainer"></div><script>
// 🔥 STEP 1: ADD YOUR FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

// Upload
async function uploadNote() {
  const title = document.getElementById("title").value;
  const subject = document.getElementById("subject").value;
  const category = document.getElementById("category").value;
  const type = document.getElementById("type").value;
  const file = document.getElementById("file").files[0];

  if (!title || !subject || !file) {
    alert("Fill all fields");
    return;
  }

  const storageRef = storage.ref("notes/" + Date.now() + "_" + file.name);
  await storageRef.put(file);
  const fileURL = await storageRef.getDownloadURL();

  await db.collection("notes").add({
    title, subject, category, type, fileURL
  });

  alert("Uploaded Successfully");
  loadNotes();
}

// Load Notes
async function loadNotes() {
  const container = document.getElementById("notesContainer");
  container.innerHTML = "";

  const snapshot = await db.collection("notes").get();
  const notes = snapshot.docs.map(doc => doc.data());

  const categories = ["Class 9","Class 10","Class 11","Class 12","CUET","NDA","NEET","JEE"];

  categories.forEach(cat => {
    const section = document.createElement("div");
    section.className = "section";
    section.innerHTML = `<h2>${cat}</h2>`;

    ["Notes","PYQ"].forEach(type => {
      const sub = document.createElement("div");
      sub.innerHTML = `<h3>${type}</h3>`;

      notes
        .filter(n => n.category === cat && n.type === type)
        .forEach(n => {
          const card = document.createElement("div");
          card.className = "card";
          card.innerHTML = `
            <h4>${n.title}</h4>
            <p>${n.subject}</p>
            <a href="${n.fileURL}" target="_blank">View</a><br>
            <a href="${n.fileURL}" download>Download</a>
          `;
          sub.appendChild(card);
        });

      section.appendChild(sub);
    });

    container.appendChild(section);
  });
}

loadNotes();
</script></body>
</html><!--
